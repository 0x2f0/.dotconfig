# starting the polkit agent
exec-once = systemctl --user start hyprpolkitagent

# wallpaper manager
exec-once = swww-daemon && swww restore 

exec-once = ./wallpapers/script.sh
exec-once = wl-clip-persist --clipboard regular 
exec-once = swaync
exec-once = ~/.config/bin/hdmi.sh

exec-once = waybar

# setting a base clock for nvidia so, that they don't slack off.
exec-once = sudo /usr/bin/nvidia-smi -lmc 2000,8501
